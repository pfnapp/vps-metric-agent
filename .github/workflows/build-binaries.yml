name: Build Binaries

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            target: bun-linux-x64-modern
            output: dist/vps-metric-agent-linux-x64
          - name: linux-arm64
            target: bun-linux-arm64
            output: dist/vps-metric-agent-linux-arm64
          - name: darwin-arm64
            target: bun-darwin-arm64
            output: dist/vps-metric-agent-darwin-arm64
          - name: windows-x64
            target: bun-windows-x64-modern
            output: dist/vps-metric-agent-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun version
        run: bun --version

      - name: Build binary (${{ matrix.name }})
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} --outfile ${{ matrix.output }} src/index.ts

      - name: Upload artifact (${{ matrix.name }})
        uses: actions/upload-artifact@v4
        with:
          name: vps-metric-agent-${{ matrix.name }}
          path: ${{ matrix.output }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/vps-metric-agent-linux-x64
            artifacts/**/vps-metric-agent-linux-arm64
            artifacts/**/vps-metric-agent-darwin-arm64
            artifacts/**/vps-metric-agent-windows-x64.exe
